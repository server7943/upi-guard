{% extends "base.html" %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; min-height: 70vh; align-items: center; position: relative;">
  <!-- Decorative Orb -->
  <div style="position: absolute; top: 20%; left: 30%; width: 200px; height: 200px; background: var(--accent-cyan); filter: blur(120px); opacity: 0.15;"></div>

  <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 4rem 3rem;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
      <h2 class="text-cyan" style="font-size: 2rem;">Admin Login</h2>
      <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 0.5rem; letter-spacing: 1px;">SECURE ACCESS REQUIRED</p>
    </div>

    <form onsubmit="event.preventDefault(); login();">
      <div class="form-group">
        <label class="form-label" for="uname">Username</label>
        <input type="text" id="uname" name="uname" class="cyber-input" placeholder="Enter username" required>
      </div>
      
      <div class="form-group" style="margin-bottom: 2rem;">
        <label class="form-label" for="pwd">Password</label>
        <input type="password" id="pwd" name="pwd" class="cyber-input" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn-cyber primary" style="width: 100%;">Authenticate</button>
    </form>
  </div>
</div>

<script>
  function login() {
    var uname = document.getElementById("uname").value;
    var pwd = document.getElementById("pwd").value;

    if (uname === "admin" && pwd === "admin") {
      alert("Login Success! Authenticated as Admin.");
      // redirect to upload page as per original flow
      window.location = "{{ url_for('upload') }}"; 
    } else {
      alert("Access Denied! Invalid Credentials.");
    }
  }
</script>
{% endblock %}
