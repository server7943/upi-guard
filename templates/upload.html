{% extends "base.html" %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; min-height: 70vh; align-items: center; position: relative;">
  <!-- Decorative Orb -->
  <div style="position: absolute; top: 10%; right: 30%; width: 350px; height: 350px; background: var(--accent-cyan); filter: blur(180px); opacity: 0.15;"></div>

  <div class="glass-panel" style="width: 100%; max-width: 600px; padding: 4rem 3rem; text-align: center;">

    <div style="margin-bottom: 3rem;">
      <h2 class="text-cyan" style="font-size: 2.2rem; margin-bottom: 0.5rem;">Dataset Ingestion</h2>
      <p style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500; letter-spacing: 1px;">PROVIDE BATCH DATA FOR NEURAL ANALYSIS</p>
    </div>

    <form action="{{ url_for('preview') }}" method="post" enctype="multipart/form-data">
      
      <div style="border: 2px dashed #cbd5e1; border-radius: 16px; padding: 3rem; margin-bottom: 2rem; background: rgba(59, 130, 246, 0.05); transition: all 0.3s ease;" onmouseover="this.style.background='rgba(59, 130, 246, 0.1)'" onmouseout="this.style.background='rgba(59, 130, 246, 0.05)'">
        <svg style="width: 50px; height: 50px; color: var(--accent-cyan); margin-bottom: 1.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        <br>
        <input type="file" name="datasetfile" id="file1" style="display: none;" required onchange="document.getElementById('filename-display').innerText = this.files[0].name;" />
        <label for="file1" class="btn-cyber" style="cursor: pointer; display: inline-block;">Select CSV File</label>
        <p id="filename-display" style="margin-top: 1rem; color: var(--text-main); font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.9rem;"></p>
      </div>

      <button type="submit" class="btn-cyber primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Preview Dataset</button>
    </form>

  </div>
</div>
{% endblock %}
